{% include base_path %}

<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav">
        <button><div class="navicon"></div></button>
        <ul class="visible-links">
          <li class="masthead__menu-item masthead__menu-item--lg"><a href="{{ base_path }}/">{{ site.title }}</a></li>
          {% for link in site.data.navigation.main %}
            {% if link.url contains 'http' %}
              {% assign domain = '' %}
              {% else %}
              {% assign domain = base_path %}
            {% endif %}
            <li class="masthead__menu-item"><a href="{{ domain }}{{ link.url }}">{{ link.title }}</a></li>
          {% endfor %}
          
          <!-- 语言切换器 - 支持悬浮和点击展示 -->
          <li class="masthead__menu-item lang-dropdown">
            <button type="button" class="dropdown-trigger">
              {% if page.lang == 'zh' %}
                <span>语言</span>
              {% else %}
                <span>Language</span>
              {% endif %}
              <span class="dropdown-arrow">▼</span>
            </button>
            <ul class="dropdown-menu">
              <li><a href="#" data-lang="en" {% if page.lang == 'en' or page.lang == nil %}class="active"{% endif %}>English</a></li>
              <li><a href="#" data-lang="zh" {% if page.lang == 'zh' %}class="active"{% endif %}>中文 (Chinese)</a></li>
            </ul>
          </li>
        </ul>
        <ul class="hidden-links hidden"></ul>
      </nav>
    </div>
  </div>
</div>
